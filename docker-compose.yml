version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: notifyr_postgres
    environment:
      POSTGRES_DB: notifyr_db
      POSTGRES_USER: notifyr_user
      POSTGRES_PASSWORD: notifyr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notify_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: notifyr_user
      RABBITMQ_DEFAULT_PASS: notifyr_password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port

  redis:
    image: redis:7-alpine
    container_name: notifyr_redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: notifyr_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: notifyr_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
volumes:
  postgres_data: