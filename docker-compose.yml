version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: notifyr_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notify_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port

  redis:
    image: redis:7-alpine
    container_name: notifyr_redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: notifyr_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: notifyr_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  app:
    build: .
    container_name: notifyr_app
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8080:8080"
    environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?TimeZone=Asia/Kolkata
        SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
        SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
        SPRING_RABBITMQ_HOST: rabbitmq
        SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
        SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
        SPRING_DATA_REDIS_HOST: redis
        MAIL_USERNAME: ${MAIL_USERNAME}
        MAIL_PASSWORD: ${MAIL_PASSWORD}
        TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
        TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
        TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
        API_KEY: ${API_KEY}
        NOTIFICATION_JWT_SECRET: ${JWT_SECRET}
volumes:
  postgres_data: