spring:
  application:
    name: Notifyr

  datasource:
    url: jdbc:postgresql://localhost:5432/notifyr_db?TimeZone=Asia/Kolkata
    username: notifyr_user
    password:  notifyr_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

notification:
  queue:
    name: notification.queue
  exchange:
    name: notification.exchange
  routing-key: notification.route

server:
  port: 8080
